<!DOCTYPE html>
<html>
<head>
  <title>🚀 Bug → API Generator</title>

  <style>
    body {
      font-family: Arial;
      max-width: 1000px;
      margin: auto;
    }

    textarea {
      width: 100%;
      height: 120px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 10px;
      overflow: auto;
      max-height: 400px;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .files {
      width: 30%;
      border-right: 1px solid #ccc;
    }

    .code {
      width: 70%;
    }

    li {
      cursor: pointer;
      margin-bottom: 5px;
    }

    li:hover {
      color: blue;
    }
  </style>
</head>

<body>

<h2>🚀 Gerador de API (SaaS)</h2>

<label>Descreva o bug:</label>
<textarea id="bug"></textarea>

<button onclick="gerar()">Gerar Projeto</button>

<h3>Status:</h3>
<div id="status"></div>

<h3>User Story:</h3>
<pre id="story"></pre>

<h3>Critérios de Aceitação:</h3>
<ul id="criteria"></ul>

<h3>Projeto:</h3>

<div class="container">
  
  <!-- LISTA DE ARQUIVOS -->
  <div class="files">
    <ul id="fileList"></ul>
  </div>

  <!-- CÓDIGO -->
  <div class="code">
    <pre id="codeView">Selecione um arquivo...</pre>
  </div>

</div>

<h3>Download:</h3>
<a id="download" href="#" target="_blank"></a>

<script>

let arquivos = {};

async function gerar() {
    const bug = document.getElementById("bug").value;

    document.getElementById("status").innerText = "Gerando...";
    document.getElementById("criteria").innerHTML = "";
    document.getElementById("fileList").innerHTML = "";
    document.getElementById("codeView").innerText = "";

    try {
        // 🔹 GERAR PROJETO
        const res = await fetch("/generate-project", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ bug })
        });

        const data = await res.json();
        console.log("DATA:", data);

        document.getElementById("status").innerText = "Pronto ✔";

        // 🔹 USER STORY
        document.getElementById("story").innerText = data.user_story || "Não gerado";

        // 🔹 CRITÉRIOS
        if (data.acceptance_criteria) {
            data.acceptance_criteria.forEach(item => {
                const li = document.createElement("li");
                li.innerText = item;
                document.getElementById("criteria").appendChild(li);
            });
        }

        // 🔹 BUSCAR ARQUIVOS
        const filesRes = await fetch("/get-project-files");
        const filesData = await filesRes.json();

        console.log("FILES:", filesData);

        arquivos = filesData.files || {};

        renderFiles();

        // 🔹 DOWNLOAD
        document.getElementById("download").href = "/download-project";
        document.getElementById("download").innerText = "Baixar projeto";

    } catch (err) {
        console.error("ERRO:", err);
        document.getElementById("status").innerText = "Erro ❌";
    }
}

function renderFiles() {
    const list = document.getElementById("fileList");

    list.innerHTML = "";

    if (!arquivos || Object.keys(arquivos).length === 0) {
        list.innerHTML = "<li>Nenhum arquivo encontrado</li>";
        return;
    }

    Object.keys(arquivos).forEach(nome => {
        const li = document.createElement("li");
        li.innerText = nome;

        li.onclick = () => {
            document.getElementById("codeView").innerText = arquivos[nome];
        };

        list.appendChild(li);
    });
}

</script>

</body>
</html>
