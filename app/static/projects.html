<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MBA IA - Meus Projetos</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>MBA IA - Bug Evaluation</h1>
      <p>Meus projetos gerados</p>
    </div>

    <nav>
      <a href="/static/dashboard.html">Dashboard</a>
      <a href="/docs">Swagger</a>
      <a id="adminLink" href="/static/admin.html" class="hidden">Admin</a>
      <button onclick="logout()">Sair</button>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <div class="section-header">
        <div>
          <h2>Meus Projetos</h2>
          <p class="muted">
            Consulte os projetos gerados, visualize arquivos, baixe conteúdos e exporte ZIPs.
          </p>
        </div>

        <button onclick="loadProjectsPage()">Atualizar projetos</button>
      </div>

      <div class="filters-row">
        <label for="projectSearch">Buscar projeto</label>
        <input
          id="projectSearch"
          type="text"
          placeholder="Buscar por nome, bug ou status..."
          oninput="filterProjectsPage()"
        />
      </div>

      <div id="projectsPageMessage" class="message"></div>
      <div class="form-group">
        <label for="projectValidationFilter"><strong>Filtrar por validação</strong></label>
        <select id="projectValidationFilter" onchange="filterProjectsPage()">
          <option value="all">Todos</option>
          <option value="valid">Válidos</option>
          <option value="invalid">Inválidos</option>
          <option value="without_validation">Sem validação</option>
          <option value="requirements_imports_ok">Requirements x imports OK</option>
          <option value="requirements_imports_error">Requirements x imports com erro</option>
          <option value="requirements_imports_unavailable">Requirements x imports não disponível</option>
        </select>
      </div>

      <div id="projectsValidationSummary" class="history-validation"></div>
      <div id="projectsPageList" class="list"></div>
    </section>
  </main>

  <script src="/static/app.js?v=7.9"></script>
  <script>
    requireAuth();
    loadDashboard();
    loadProjectsPage();
  </script>
</body>
</html>
