name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  python-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install python-dotenv

      - name: Compile Python files
        run: |
          python -m py_compile app/services/generator_service.py
          python -m py_compile app/services/project_builder_service.py
          python -m py_compile app/main.py

      - name: Import FastAPI app
        run: |
          python -c "from app.main import app; print('OK app')"

      - name: Check supplier generator markers
        run: |
          grep -n "build_supplier_api_tests_py" app/services/generator_service.py
          grep -n "test_fornecedores.py" app/services/generator_service.py
          grep -n "pytest" app/services/generator_service.py
          grep -n "httpx" app/services/generator_service.py
          grep -n "API de Fornecedores com SQLite" app/services/generator_service.py